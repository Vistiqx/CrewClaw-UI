# ============================================================================
# CrewClaw-UI - Docker Compose
# ============================================================================

version: '3.8'

services:
  crewclaw-ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crewclaw-ui
    ports:
      - "3000:3000"
    volumes:
      - /opt/data/crewclaw/ui:/opt/data/crewclaw/ui
      - /opt/data/assistants:/opt/data/assistants
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - UI_ENCRYPTION_KEY=${UI_ENCRYPTION_KEY}
      - DATA_PATH=/opt/data/crewclaw/ui
      - DB_PATH=/opt/data/crewclaw/ui/ui.db
      - REGISTRY_PATH=/opt/data/crewclaw/business-registry.json
      - DOCKER_SOCKET=/var/run/docker.sock
      - UI_PORT=3000
      - UI_HOST=0.0.0.0
      - LOG_LEVEL=info
    restart: unless-stopped
    privileged: true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
